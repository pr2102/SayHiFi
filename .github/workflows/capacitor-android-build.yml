name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Create Firebase env file
        run: |
          cat > .env <<'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          EOF

      - name: Build React app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        shell: bash
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee gradle-build.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            tail -n 80 gradle-build.log > gradle-tail.log
            message=$(python3 - <<'PY'
          from pathlib import Path
          text = Path("gradle-tail.log").read_text(errors="replace")
          text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(text[:7000])
          PY
          )
            echo "::error title=Gradle build failed::$message"
            exit "$status"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sayhifi-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: android/gradle-build.log
          if-no-files-found: ignore
